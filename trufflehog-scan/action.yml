name: 'TruffleHog Scan'
description: 'Scans for verified secrets using TruffleHog OSS.'
inputs:
  version:
    description: 'TruffleHog version to download (e.g. "3.88.1"). Defaults to the newest release that is at least minimum-age-days old.'
    required: false
    default: ''
  minimum-age-days:
    description: 'Minimum age in days a release must be before it is auto-selected. Ignored when version is explicitly set. Default: 3.'
    required: false
    default: '3'
  base:
    description: 'Base commit SHA or ref to scan from. Leave empty to scan the full git history.'
    required: false
    default: ''
  exclude-paths:
    description: 'Path to a file listing paths to exclude from the scan.'
    required: false
    default: ''
  include-paths:
    description: 'Path to a file listing paths to include in the scan.'
    required: false
    default: ''
  annotations:
    description: 'Emit GitHub annotations for each finding. Set to "false" to suppress annotations and handle them yourself.'
    required: false
    default: 'true'
  output-file:
    description: 'Path to write raw TruffleHog JSON findings. If set, the findings file is copied here before cleanup so callers can post-process results.'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Run TruffleHog
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_MIN_AGE_DAYS: ${{ inputs.minimum-age-days }}
        INPUT_BASE: ${{ inputs.base }}
        INPUT_EXCLUDE_PATHS: ${{ inputs.exclude-paths }}
        INPUT_INCLUDE_PATHS: ${{ inputs.include-paths }}
        INPUT_ANNOTATIONS: ${{ inputs.annotations }}
        INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
      run: bash "$GITHUB_ACTION_PATH/scripts/trufflehog_scan.sh"