name: 'TruffleHog Scan'
description: 'Scans for verified secrets using TruffleHog OSS.'
inputs:
  base:
    description: 'Base branch to compare against. Defaults to the PR base or repository default branch.'
    required: false
    default: ''
  head:
    description: 'Head commit or branch to scan to. Defaults to HEAD.'
    required: false
    default: 'HEAD'
  exclude-paths:
    description: 'Path to a file listing paths to exclude from the scan.'
    required: false
    default: ''
  include-paths:
    description: 'Path to a file listing paths to include in the scan.'
    required: false
    default: ''
runs:
  using: "composite"
  steps:
    - name: Configure git safe directory for TruffleHog container
      shell: bash
      run: |
        mkdir -p "$RUNNER_TEMP/_github_home"
        git config -f "$RUNNER_TEMP/_github_home/.gitconfig" --add safe.directory /tmp
    - name: TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ inputs.base || github.event.repository.default_branch }}
        head: ${{ inputs.head }}
        extra_args: --only-verified ${{ inputs.exclude-paths != '' && format('--exclude-paths={0}', inputs.exclude-paths) || '' }} ${{ inputs.include-paths != '' && format('--include-paths={0}', inputs.include-paths) || '' }}
