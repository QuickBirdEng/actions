name: 'Detect Invisible Unicode'
description: 'Scans source files for invisible Unicode characters used in GlassWorm and Trojan Source supply chain attacks.'
inputs:
  search-directory:
    description: 'Directory to scan recursively.'
    required: false
    default: '.'
  exclude:
    description: |
      Newline- or comma-separated glob patterns for additional files and directories to exclude.
      The following are always excluded: .git/**, node_modules/**, .idea/**, build/**, dist/**, and common binary/image types.
    required: false
    default: ''
  fail-on-found:
    description: 'Exit with code 1 when invisible Unicode characters are found.'
    required: false
    default: 'true'
outputs:
  findings:
    description: 'Number of files containing invisible Unicode characters.'
    value: ${{ steps.scan.outputs.findings }}
runs:
  using: "composite"
  steps:
    - id: scan
      shell: bash
      env:
        INPUT_SEARCH_DIRECTORY: ${{ inputs.search-directory }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
        INPUT_FAIL_ON_FOUND: ${{ inputs.fail-on-found }}
      run: bash "$GITHUB_ACTION_PATH/scripts/detect_invisible_unicode.sh"
