name: Test actions

on:
  pull_request:
  push:
    paths:
      - "js-supply-chain-check/**"
      - "test-repo/**"

jobs:
  test-js-supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bats-core/bats-action@2
      - run: bats js-supply-chain-check/tests/
