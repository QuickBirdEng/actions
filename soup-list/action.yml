name: 'Dependencies (SOUP) List'
description: 'List of all dependencies in the repository'
inputs:
  html-output:
    description: 'Generate a unified HTML report of all dependencies'
    required: false
    default: 'true'
runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Install yq
      shell: bash
      run: |
        YQ="$HOME/.local/bin/yq"
        mkdir -p "$(dirname "$YQ")"

        if [[ "$RUNNER_OS" == "Linux" ]]; then
          curl -L -o "$YQ" https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        elif [[ "$RUNNER_OS" == "macOS" ]]; then
          curl -L -o "$YQ" https://github.com/mikefarah/yq/releases/latest/download/yq_darwin_amd64
        else
          echo "Unsupported OS: $RUNNER_OS"
          exit 1
        fi

        chmod +x "$YQ"
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    - shell: bash
      run: yq --version
    - name: Dependencies List
      shell: bash
      run: |
        mkdir -p results
        echo '"Dependency","Version"' > results/web.csv
        echo '"Dependency","Version"' > results/flutter.csv

        FILES=$(git ls-files | grep -E "package\.json$|pubspec\.yaml$" || true)

        for FILE in $FILES; do
          echo "Processing: $FILE"
          EXT="${FILE##*.}"
          if [[ "$EXT" == "json" ]]; then
            # Extract web dependencies
            jq -r '.dependencies // {} | to_entries[] | "\(.key),\(.value)"' "$FILE" | sort >> results/web.csv
          elif [[ "$EXT" == "yaml" ]]; then
            TMP_JSON=$(mktemp)
            yq e -o=json '.' "$FILE" > "$TMP_JSON"

          jq -r '
            .dependencies as $deps |
            $deps
            | to_entries[]
            | select(
                # Keep only entries that are NOT {sdk: "flutter"}
                (.value | type != "object" or (.sdk // "") != "flutter")
              )
            | {
                name: .key,
                version_or_url: (
                    if (.value | type == "string") then
                        .value
                    elif (.value | type == "object" and has("git")) then
                        .value.git.url + (if (.value.git.ref // empty) != "" then "@" + .value.git.ref else "" end)
                    elif (.value | type == "object" and has("version")) then
                        .value.version
                    else
                        "unknown"
                    end
                )
            }
            | [.name, .version_or_url]
            | @csv
          ' "$TMP_JSON" >> flutter_temp.csv

            rm "$TMP_JSON"
          fi
        done

        if [[ -f flutter_temp.csv ]]; then
          sort -t, -k1,1 flutter_temp.csv >> results/flutter.csv
          rm flutter_temp.csv
        fi

    - name: Generate HTML Report
      if: ${{ inputs.html-output == 'true' }}
      shell: bash
      run: |
        OUT="results/dependencies.html"
        cat > "$OUT" <<'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
          <meta charset="UTF-8">
          <title>Software Bill of Material</title>
          <style>
            body { font-family: sans-serif; padding: 2rem; }
            h2 { margin-top: 2rem; }
            ul { list-style: disc; padding-left: 1.5rem; }
            li { padding: 0.2rem 0; }
          </style>
        </head>
        <body>
        <h1>Software Bill of Material</h1>
        EOF

        clean_version() {
          local v="$1"
          # Strip leading ^ or ~ or = or v
          v="${v#^}"
          v="${v#\~}"
          v="${v#=}"
          v="${v#v}"
          # If it looks like a git URL ending in @vX.Y.Z or @X.Y.Z, extract that part
          if [[ "$v" == *".git@"* ]]; then
            v="${v##*.git@}"
            v="${v#v}"
          fi
          echo "$v"
        }

        add_section() {
          local title="$1"
          local file="$2"
          if [[ -f "$file" ]]; then
            echo "<h2>$title</h2>" >> "$OUT"
            echo "<ul>" >> "$OUT"
            tail -n +2 "$file" | while IFS=, read -r name version; do
              name="${name//\"/}"
              version="${version//\"/}"
              [[ "$version" == file:* ]] && continue
              version=$(clean_version "$version")
              echo "<li>$name → <em>$version</em></li>" >> "$OUT"
            done
            echo "</ul>" >> "$OUT"
          fi
        }

        add_section "Mobile (Flutter)" "results/flutter.csv"
        add_section "Web" "results/web.csv"

        echo "</body></html>" >> "$OUT"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dependencies-list
        path: results
        retention-days: 90

