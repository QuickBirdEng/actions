name: 'JS Supply-Chain Check'
description: 'Audits npm/yarn/pnpm projects for the three supply-chain hardenings: minimum release age, blocked exotic subdeps, and install-script allowlist.'
inputs:
  search-directory:
    description: 'Directory to scan recursively for JS projects (lockfiles).'
    required: false
    default: '.'
  exclude:
    description: |
      Newline- or comma-separated glob patterns for additional files and directories to exclude.
      The following are always excluded: .git/**, node_modules/**, .idea/**, build/**, dist/**.
    required: false
    default: ''
  minimum-release-age-minutes:
    description: 'Required quarantine period in minutes for newly published package versions (pnpm `minimumReleaseAge`). Default 10080 (7 days). Set to 0 to disable the check.'
    required: false
    default: '10080'
  allow-builds:
    description: |
      Newline- or comma-separated list of package names allowed to run install/lifecycle scripts.
      Empty (default) means NO package may run install scripts; the check requires `ignore-scripts=true`
      (npm/yarn classic) / `enableScripts: false` (yarn berry) / empty `pnpm.onlyBuiltDependencies` (pnpm).
    required: false
    default: ''
  check-install-scripts:
    description: |
      When false, the install-scripts (allowBuilds) sub-check is skipped entirely.
      Use this to disable just that one check while leaving minimum-release-age
      and blockExoticSubdeps in force. (To re-enable install scripts for specific
      packages instead of disabling the check, prefer the `allow-builds` input.)
    required: false
    default: 'true'
  require-block-exotic-subdeps:
    description: 'When true, every project must enable blockExoticSubdeps (pnpm) AND every lockfile is scanned for git/tarball/file deps (all managers). Set to false to skip this sub-check entirely.'
    required: false
    default: 'true'
  enforce-release-age-via-registry:
    description: |
      Opt-in CI-time band-aid. When true, looks up each lockfile entry's
      publish date against the npm registry and fails on too-recent versions.
      Default false because this gates PRs but does NOT protect a developer
      who runs yarn/npm install on a local branch before review. For real
      install-time enforcement, migrate the project to pnpm 10+ where
      minimum-release-age is honored natively. When false, yarn/npm projects
      with minimum-release-age set will hard-fail with a migration prompt.
    required: false
    default: 'false'
  pnpm-min-version:
    description: |
      Minimum pnpm version where the recommended settings (minimumReleaseAge,
      blockExoticSubdeps) actually take effect. Projects pinning an older
      pnpm via package.json#packageManager get a top-level error explaining
      that even correct .npmrc settings are silently ignored by old pnpm.
    required: false
    default: '10.0.0'
  yarn-min-version:
    description: |
      Minimum yarn (berry) version where native install-time enforcement of
      all three policies is available: npmMinimalAgeGate (yarn 4.10+, full
      support 4.12+) and approvedGitRepositories (yarn 4.14+). Projects on
      yarn 1.x or yarn-berry below this version hard-fail with a migration
      prompt (yarn 4.14+ OR pnpm 10+).
    required: false
    default: '4.14.0'
  fail-on-found:
    description: 'Exit with code 1 when any error-level finding is reported.'
    required: false
    default: 'true'
outputs:
  findings:
    description: 'Number of error-level findings across all scanned projects.'
    value: ${{ steps.scan.outputs.findings }}
  warnings:
    description: 'Number of warning-level findings across all scanned projects.'
    value: ${{ steps.scan.outputs.warnings }}
  projects-scanned:
    description: 'Number of JS projects (lockfiles) discovered and scanned.'
    value: ${{ steps.scan.outputs.projects-scanned }}
runs:
  using: "composite"
  steps:
    - id: scan
      shell: bash
      env:
        INPUT_SEARCH_DIRECTORY: ${{ inputs.search-directory }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
        INPUT_MINIMUM_RELEASE_AGE_MINUTES: ${{ inputs.minimum-release-age-minutes }}
        INPUT_ALLOW_BUILDS: ${{ inputs.allow-builds }}
        INPUT_CHECK_INSTALL_SCRIPTS: ${{ inputs.check-install-scripts }}
        INPUT_REQUIRE_BLOCK_EXOTIC_SUBDEPS: ${{ inputs.require-block-exotic-subdeps }}
        INPUT_ENFORCE_RELEASE_AGE_VIA_REGISTRY: ${{ inputs.enforce-release-age-via-registry }}
        INPUT_PNPM_MIN_VERSION: ${{ inputs.pnpm-min-version }}
        INPUT_YARN_MIN_VERSION: ${{ inputs.yarn-min-version }}
        INPUT_FAIL_ON_FOUND: ${{ inputs.fail-on-found }}
      run: bash "$GITHUB_ACTION_PATH/scripts/js_supply_chain_check.sh"
